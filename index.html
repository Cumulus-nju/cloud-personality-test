<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☁️ 云型人格测试 CTPI</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: system-ui, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  min-height: 100vh;
  color: #2c3e50;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  background: #e8f0f5;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url('images/bg-campus.webp') center/cover no-repeat;
  filter: blur(12px) brightness(1.06);
  z-index: -2;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: rgba(240,245,250,0.62);
  z-index: -1;
}
#app {
  width: 100%;
  max-width: 640px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(24px);
  border-radius: 28px;
  box-shadow: 0 8px 48px rgba(70,100,130,0.08), 0 2px 12px rgba(0,0,0,0.04);
  padding: 40px 32px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(170,205,230,0.3);
}
#app::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(160,200,225,0.10) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
#app::after {
  content: '';
  position: absolute;
  bottom: -35px; left: -35px;
  width: 170px; height: 170px;
  background: radial-gradient(circle, rgba(190,215,235,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
#intro, #quiz, #result, #loading { position: relative; z-index: 1; }

/* Intro */
#intro { text-align: center; padding: 20px 0; }
#intro .icon { font-size: 64px; margin-bottom: 16px; display: inline-block; animation: float 3s ease-in-out infinite; }
#intro h1 { font-size: 28px; margin-bottom: 8px; color: #1a3a4a; }
#intro .subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 24px; line-height: 1.6; }
#intro .info { font-size: 13px; color: #95a5a6; margin-bottom: 32px; line-height: 1.8; }
#intro .info span { color: #5a7a8a; font-weight: 600; }
.btn {
  display: inline-block;
  padding: 14px 48px;
  border: none; border-radius: 100px;
  font-size: 16px; font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  color: #fff;
  background: linear-gradient(135deg, #7db8d8 0%, #5b9fd5 100%);
  box-shadow: 0 4px 20px rgba(91,155,213,0.25);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(91,155,213,0.35); }
.btn:active { transform: scale(0.97); }
.btn.outline {
  background: transparent; color: #5b9bd5;
  border: 2px solid rgba(91,155,213,0.4); box-shadow: none;
}
.btn.outline:hover { background: rgba(91,155,213,0.05); border-color: #5b9bd5; }
.btn.small { padding: 8px 24px; font-size: 14px; }

/* Quiz */
.progress-wrap {
  background: rgba(190,210,225,0.30); border-radius: 100px;
  height: 8px; margin-bottom: 28px;
}
.progress-bar {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, #a8d4e6, #6badd8, #8ecae8);
  transition: width 0.4s;
  box-shadow: 0 0 12px rgba(107,173,216,0.25);
}
.question-num { font-size: 12px; color: #8a9aaa; margin-bottom: 8px; }
.question-text { font-size: 20px; line-height: 1.6; margin-bottom: 28px; color: #1a3a4a; font-weight: 500; }
.options { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.opt-btn {
  flex: 1; min-width: 56px;
  padding: 16px 8px;
  border: 2px solid rgba(175,200,220,0.30);
  border-radius: 100px;
  background: rgba(255,255,255,0.60);
  backdrop-filter: blur(6px);
  cursor: pointer;
  text-align: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-size: 13px; color: #5a7a8a;
  box-shadow: 0 2px 8px rgba(80,120,160,0.04);
}
.opt-btn:hover {
  border-color: rgba(140,190,220,0.6);
  background: rgba(255,255,255,0.88);
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(80,140,200,0.12);
}
.opt-btn.selected {
  border-color: #6badd8;
  background: linear-gradient(135deg, #ecf5fb 0%, #ddeef8 100%);
  color: #3578a8;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(91,155,213,0.16), inset 0 1px 0 rgba(255,255,255,0.8);
  transform: translateY(-2px);
}
.opt-btn .num { display: block; font-size: 18px; font-weight: 700; margin-bottom: 2px; }
.opt-btn.selected .num { color: #4a8bc2; }
.opt-btn .label { font-size: 11px; opacity: 0.75; }
.opt-btn.selected .label { opacity: 1; }
.quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; }
.quiz-nav .hint { font-size: 12px; color: #b0bec5; }

/* Loading */
#loading { text-align: center; padding: 40px 0; }
#loading .cloud-anim { font-size: 48px; animation: float 2s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
#loading p { margin-top: 16px; color: #7f8c8d; }

/* Result */
.type-header { text-align: center; margin-bottom: 28px; }
.type-emoji { font-size: 72px; margin-bottom: 8px; }
.type-name { font-size: 32px; font-weight: 700; color: #1a3a4a; }
.type-subtitle { font-size: 16px; color: #7f8c8d; margin-top: 4px; }
.type-tagline { font-size: 15px; color: #5a7a8a; margin-top: 8px; font-style: italic; }

.result-sections { display: flex; flex-direction: column; gap: 16px; }
.result-card {
  background: rgba(248,252,255,0.65);
  backdrop-filter: blur(6px);
  border-radius: 16px;
  padding: 18px 20px;
  border: 1px solid rgba(180,205,225,0.22);
  box-shadow: 0 2px 12px rgba(0,0,0,0.02);
}
.result-card h3 { font-size: 14px; color: #5a7a8a; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.result-card p, .result-card li { font-size: 14px; line-height: 1.7; color: #3a4a5a; }
.result-card ul { padding-left: 18px; }
.result-card li { margin-bottom: 4px; }

.tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
.tag {
  padding: 6px 14px; border-radius: 100px;
  font-size: 12px; font-weight: 500;
  background: rgba(230,242,250,0.8); color: #4a8bc2;
  border: 1px solid rgba(180,210,235,0.2);
}
.tag.good { background: rgba(232,245,233,0.8); color: #388e3c; border-color: rgba(160,200,160,0.25); }
.tag.bad { background: rgba(251,233,231,0.8); color: #d84315; border-color: rgba(215,175,165,0.25); }

.mbti-ref { text-align: center; font-size: 13px; color: #95a5a6; margin-top: 12px; }

.sec-type { text-align: center; margin-top: 16px; padding: 12px; background: rgba(248,252,255,0.6); border-radius: 14px; font-size: 13px; color: #7f8c8d; border: 1px solid rgba(180,205,225,0.15); }
.sec-type strong { color: #5a7a8a; }

.result-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: center; flex-wrap: wrap; }

/* score bars */
.score-list { margin-top: 8px; }
.score-row { display: flex; align-items: center; margin-bottom: 6px; gap: 10px; }
.score-row .s-name { width: 70px; font-size: 12px; color: #7f8c8d; text-align: right; flex-shrink: 0; }
.score-row .s-bar-wrap { flex: 1; background: rgba(200,215,228,0.25); border-radius: 100px; height: 8px; }
.score-row .s-bar { height: 100%; border-radius: 100px; background: rgba(160,195,220,0.6); transition: width 0.6s; }
.score-row .s-bar.top { background: linear-gradient(90deg, #7db8d8, #a8d8ea); box-shadow: 0 0 8px rgba(107,173,216,0.2); }
.score-row .s-val { width: 30px; font-size: 11px; color: #95a5a6; text-align: left; }

/* detail toggle */
.detail-toggle { text-align: center; margin-top: 12px; }
.detail-toggle button { font-size: 12px; color: #95a5a6; background: none; border: none; cursor: pointer; text-decoration: underline; }

/* back button */
.btn.back {
  background: rgba(255,255,255,0.5); color: #5a7a8a;
  border: 2px solid rgba(180,200,215,0.3); box-shadow: none;
  backdrop-filter: blur(4px);
}
.btn.back:hover { background: rgba(255,255,255,0.8); border-color: rgba(150,175,200,0.5); }

/* cloud image carousel */
.cloud-image-wrap {
  margin: 0 -32px 20px -32px;
  position: relative;
  overflow: hidden;
  background: #eef2f6;
}
.cloud-image-wrap img {
  width: 100%; height: auto;
  display: block;
}
.cloud-image-wrap .img-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.82); border: none;
  cursor: pointer; font-size: 18px; color: #5a7a8a;
  display: flex; align-items: center; justify-content: center;
  z-index: 2; transition: all 0.2s; line-height: 1;
}
.cloud-image-wrap .img-nav:hover { background: #fff; }
.cloud-image-wrap .img-nav.prev { left: 10px; }
.cloud-image-wrap .img-nav.next { right: 10px; }
.cloud-image-wrap .img-dots {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 2;
}
.cloud-image-wrap .img-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.55); border: none;
  cursor: pointer; padding: 0; transition: all 0.2s;
}
.cloud-image-wrap .img-dot.active { background: #fff; }
.cloud-image-wrap .img-counter {
  position: absolute; top: 8px; right: 12px;
  font-size: 11px; color: rgba(255,255,255,0.9);
  background: rgba(0,0,0,0.4); padding: 2px 8px;
  border-radius: 10px; z-index: 2;
}
@media (max-width: 480px) {
  .cloud-image-wrap { margin: 0 -18px 16px -18px; }
}

/* type gallery */
.type-gallery-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(180,205,225,0.2); }
.type-gallery-title { font-size: 13px; color: #95a5a6; margin-bottom: 12px; text-align: center; }
.type-gallery {
  display: flex; gap: 10px; overflow-x: auto;
  padding: 4px 0 8px 0;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
}
.type-gallery::-webkit-scrollbar { height: 4px; }
.type-gallery::-webkit-scrollbar-thumb { background: rgba(180,200,220,0.5); border-radius: 100px; }
.type-card {
  flex: 0 0 auto; width: 82px;
  padding: 10px 6px;
  border-radius: 18px;
  border: 2px solid rgba(180,205,225,0.18);
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(4px);
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  scroll-snap-align: start;
}
.type-card:hover { border-color: rgba(150,190,220,0.5); background: rgba(255,255,255,0.85); transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.05); }
.type-card.active { border-color: #6badd8; background: rgba(235,245,252,0.9); box-shadow: 0 3px 14px rgba(91,155,213,0.12); }
.type-card .tc-emoji { font-size: 28px; display: block; margin-bottom: 4px; }
.type-card .tc-name { font-size: 11px; color: #5a6a7a; font-weight: 500; }

/* browse mode */
.browse-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  padding-bottom: 14px; border-bottom: 1px solid rgba(180,205,225,0.2);
}
.browse-header .btn { font-size: 13px; padding: 8px 20px; }
.browse-badge {
  font-size: 12px; color: #7a8a9a;
  background: rgba(240,245,250,0.7); padding: 4px 12px; border-radius: 100px;
  border: 1px solid rgba(180,205,225,0.2);
}

/* Mobile */
@media (max-width: 480px) {
  #app { padding: 28px 18px; border-radius: 18px; }
  .question-text { font-size: 18px; }
  .opt-btn { padding: 12px 4px; }
  .opt-btn .num { font-size: 16px; }
  .opt-btn .label { font-size: 10px; }
  .type-emoji { font-size: 56px; }
  .type-name { font-size: 26px; }
}
</style>
</head>
<body>

<div id="app">

  <!-- Intro Screen -->
  <div id="intro">
    <div class="icon">☁️</div>
    <h1>云型人格测试</h1>
    <p class="subtitle">Cloud Type Personality Inventory</p>
    <p class="info">
      基于 WMO 国际云图集的<span>十属云分类</span>，用天空的语言解读性格。<br>
      共 <span>30 题</span>，约需 <span>3 分钟</span>。
    </p>
    <button class="btn" onclick="startQuiz()">开始测试</button>
    <p style="margin-top:20px;font-size:11px;color:#c4cfd9;"><a href="stats.html" style="color:inherit;text-decoration:none;">访问统计</a></p>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz" style="display:none;">
    <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
    <div class="question-num" id="qNum"></div>
    <div class="question-text" id="qText"></div>
    <div class="options" id="options"></div>
    <div class="quiz-nav">
      <button class="btn small back" id="prevBtn" style="display:none;" onclick="prevQuestion()">← 上一题</button>
      <span class="hint" id="navHint"></span>
      <button class="btn small" id="nextBtn" style="display:none;" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" style="display:none;">
    <div class="cloud-anim">☁️</div>
    <p>正在计算你的云型……</p>
  </div>

  <!-- Result Screen -->
  <div id="result" style="display:none;"></div>

</div>

<script>
// ── Questions (30 items, 3 per type) ──
const questions = [
  { text: "我能盯着天空发呆很久——看云的变化比刷手机有意思。", type: "Ci" },
  // Ci 卷云
  { text: "我经常沉浸在自己的精神世界里，以至于忘了周围发生的事。", type: "Ci" },
  { text: "比起具体的技能，我对人生意义和哲学问题更感兴趣。", type: "Ci" },
  { text: "天气预报里出现「局部地区有雨」这种模糊说法，会让我有点不舒服。", type: "Cc" },
  // Cc 卷积云
  { text: "做决定前，我需要收集足够信息，模糊的状态让我不安。", type: "Cc" },
  { text: "发现逻辑错误或不精确的表述时，我很难忍住不指出来。", type: "Cc" },
  { text: "一场温柔的细雨比烈日更让我感到内心平静。", type: "Cs" },
  // Cs 卷层云
  { text: "我能敏锐察觉房间里的气氛变化，并下意识想缓和它。", type: "Cs" },
  { text: "看到别人难过，我的情绪也会被深深牵动。", type: "Cs" },
  { text: "我的兴趣爱好像天气一样多变——身边的人对此早已习以为常。", type: "Ac" },
  // Ac 高积云
  { text: "我的兴趣变得很快，上个月痴迷的，这个月可能就没什么热情了。", type: "Ac" },
  { text: "我对太多事情感到好奇，以至于很难在一个领域深耕下去。", type: "Ac" },
  { text: "做重大决定前，我需要一段「酝酿期」，就像暴雨前空气在安静地积蓄能量。", type: "As" },
  // As 高层云
  { text: "在讨论中我不急于发言，但一旦开口，通常已经想得很清楚了。", type: "As" },
  { text: "遇到突发情况时，我是周围人中最先冷静下来的那个。", type: "As" },
  { text: "就像每天看天气预报决定穿什么，我做事讲究固定的节奏和规律。", type: "Sc" },
  // Sc 层积云
  { text: "别人交代我的事，不需要提醒，我一定会按时完成。", type: "Sc" },
  { text: "在团队里我不是最耀眼的，但别人会觉得「有你在就放心」。", type: "Sc" },
  { text: "阴天让我感到安心，连续的大晴天反而会让我有点莫名的焦虑。", type: "St" },
  // St 层云
  { text: "热闹的社交场合对我是一种消耗，独处才是我恢复能量的方式。", type: "St" },
  { text: "我不追逐潮流和热门，守着自己喜欢的小世界就很满足。", type: "St" },
  { text: "一场持续的小雨可以改变我整天的状态——往好的方向。", type: "Ns" },
  // Ns 雨层云
  { text: "我很容易被艺术作品中的悲伤所触动。", type: "Ns" },
  { text: "创作（写作/绘画/音乐等）是我表达内心深处情感的主要出口。", type: "Ns" },
  { text: "我是那种会在夏天的暴雨里冲出去踩水坑的人。", type: "Cu" },
  // Cu 积云
  { text: "朋友们觉得有我在就不会冷场，我是那个带动气氛的人。", type: "Cu" },
  { text: "我相信「先做再说」，过度思考只会让机会溜走。", type: "Cu" },
  { text: "听到雷暴预警，我的第一反应不是害怕，而是兴奋。", type: "Cb" },
  // Cb 积雨云
  { text: "在群体中我倾向于主导方向，不太放心让别人做关键决定。", type: "Cb" },
  { text: "我对做成大事有强烈的渴望，平庸的日子让我不安。", type: "Cb" },
];

// ── Type Data ──
const typeData = {
  Ci: {
    name: "卷云", sub: "天际旅人", emoji: "☁️",
    family: "高云族 · 抽象思维者",
    tagline: "活在精神世界里的人——对意义上瘾，对规矩过敏。",
    overview: "卷云由高空冰晶组成，是大气中最\"孤独\"的云——不形成阴影，不参与降水，却最先感知远方的变化。卷云型人格也是如此：他们悬浮在理念的高空，不在意地面的琐碎，却总能率先察觉到时代的暗流。他们不是不合群，而是精神世界的引力太强。",
    strengths: ["创造力出众，能提出让人耳目一新的视角","思想开放，对不同观念包容度高","直觉敏锐，善于感知尚未成形的趋势","独立性强，不依赖外部认可来确认自我"],
    weaknesses: ["容易拖延——想太多而迟迟不行动","不切实际，有时忽略现实约束","难以做出长期承诺","情感表达偏弱，容易被误解为冷漠"],
    careers: ["创作/艺术", "哲学/研究", "UX设计", "自由职业", "战略咨询"],
    mbti: "INFP / ENFP",
    color: "#7c8eb4"
  },
  Cc: {
    name: "卷积云", sub: "秩序编织者", emoji: "📐",

    tagline: "大脑自带分类系统——靠规律和精确来理解世界。",

    strengths: ["组织能力极强，善于建立高效的系统","可靠精准，交付的成果让人放心","逻辑清晰，善于发现隐藏的模式和规律","审美敏锐，对\"正确\"和\"优雅\"有天然的判断力"],
    weaknesses: ["过度追求完美，容易陷入\"分析瘫痪\"","对变化和不确定性适应较慢","有时显得挑剔，容易让他人感到压力","倾向于用规则替代灵活性"],
    careers: ["编程/开发", "数据分析", "财务/审计", "编辑/出版", "项目管理"],
    mbti: "ISTJ / ESTJ",
    color: "#5b9bb5"
  },
  Cs: {
    name: "卷层云", sub: "温柔面纱", emoji: "🌙",

// Set cloud type images to local photos (WebP + JPEG fallback)
(function() {
  const imgCounts = { Ci:3, Cc:3, Cs:3, Ac:3, As:3, Sc:3, St:3, Ns:2, Cu:3, Cb:2 };
  for (const [key, count] of Object.entries(imgCounts)) {
    typeData[key].images = [];
    for (let i = 1; i <= count; i++) {
      const base = 'images/' + key + '-' + i;
      typeData[key].images.push({ webp: base + '.webp', jpg: base + '.jpg' });
    }
  }
})();

// Image carousel state & helpers
window._ctpiImgIdx = {};

function renderImageCarousel(key) {
  const data = typeData[key];
  const images = data.images;
  const idx = window._ctpiImgIdx[key] || 0;
  const count = images.length;
  const cur = images[idx];
  let dots = '';
  for (let i = 0; i < count; i++) {
    dots += '<button class="img-dot' + (i === idx ? ' active' : '') + '" onclick="setImage(\'' + key + '\',' + i + ')"></button>';
  }
  let nav = '';
  if (count > 1) {
    nav = '<button class="img-nav prev" onclick="prevImage(\'' + key + '\')">◂</button>' +
          '<button class="img-nav next" onclick="nextImage(\'' + key + '\')">▸</button>' +
          '<div class="img-dots">' + dots + '</div>';
  }
  return '<div class="cloud-image-wrap" id="imgwrap-' + key + '">' +
    '<picture><source srcset="' + cur.webp + '" type="image/webp">' +
    '<img src="' + cur.jpg + '" alt="' + data.name + '" loading="lazy" decoding="async"></picture>' +
    '<span class="img-counter">' + (idx + 1) + ' / ' + count + '</span>' +
    nav + '</div>';
}

function nextImage(key) {
  const images = typeData[key].images;
  let idx = (window._ctpiImgIdx[key] || 0) + 1;
  if (idx >= images.length) idx = 0;
  updateImage(key, idx);
}
function prevImage(key) {
  const images = typeData[key].images;
  let idx = (window._ctpiImgIdx[key] || 0) - 1;
  if (idx < 0) idx = images.length - 1;
  updateImage(key, idx);
}
function setImage(key, idx) { updateImage(key, idx); }
function updateImage(key, idx) {
  window._ctpiImgIdx[key] = idx;
  const images = typeData[key].images;
  const cur = images[idx];
  const wrap = document.getElementById('imgwrap-' + key);
  if (!wrap) return;
  const source = wrap.querySelector('source');
  if (source) source.srcset = cur.webp;
  const img = wrap.querySelector('img');
  if (img) img.src = cur.jpg;
  const counter = wrap.querySelector('.img-counter');
  if (counter) counter.textContent = (idx + 1) + ' / ' + images.length;
  const dots = wrap.querySelectorAll('.img-dot');
  dots.forEach(function(d, i) { d.classList.toggle('active', i === idx); });
}

// ── State ──
let currentQ = 0;
let answers = {};
let shuffled = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  shuffled = shuffle(questions.map((_, i) => i));
  currentQ = 0;
  answers = {};
  document.getElementById('intro').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const idx = shuffled[currentQ];
  const q = questions[idx];
  document.getElementById('qNum').textContent = `第 ${currentQ + 1} / ${questions.length} 题`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + '%';
  document.getElementById('nextBtn').style.display = answers[idx] !== undefined ? 'inline-block' : 'none';
	  document.getElementById('prevBtn').style.display = currentQ > 0 ? 'inline-block' : 'none';
  document.getElementById('navHint').textContent = answers[idx] !== undefined ? '已选择，点击下一题' : '请选择一个选项';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const labels = [
    { num:'1', txt:'完全不像我' },
    { num:'2', txt:'不太像我' },
    { num:'3', txt:'有点像我' },
    { num:'4', txt:'很像我' },
    { num:'5', txt:'完全就是我' },
  ];
  labels.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (answers[idx] === i + 1) btn.classList.add('selected');
    btn.innerHTML = `<span class="num">${l.num}</span><span class="label">${l.txt}</span>`;
    btn.onclick = () => selectAnswer(idx, i + 1);
    opts.appendChild(btn);
  });
}

function selectAnswer(qIdx, score) {
  answers[qIdx] = score;
  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('navHint').textContent = '已选择，点击下一题';
  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    b.classList.toggle('selected', i + 1 === score);
  });
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showLoading();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevQuestion() {
	  if (currentQ > 0) {
	    currentQ--;
	    renderQuestion();
	    window.scrollTo({ top: 0, behavior: 'smooth' });
	  }
	}

	function showLoading() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  setTimeout(showResult, 1200);
}

function showResult() {
  document.getElementById('loading').style.display = 'none';

  // Calculate scores
  const scores = {};
  for (const [idx, score] of Object.entries(answers)) {
    const type = questions[parseInt(idx)].type;
    scores[type] = (scores[type] || 0) + score;
  }

  // Max possible per type = 4 questions × 5 = 20
  const maxPer = 15;
  const pct = {};
  for (const [t, s] of Object.entries(scores)) {
    pct[t] = Math.round((s / maxPer) * 100);
  }

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topType = sorted[0][0];
  const secType = sorted[1] ? sorted[1][0] : null;
  const data = typeData[topType];

  const resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';

  const secHtml = secType && sorted[1][1] >= sorted[0][1] * 0.75
    ? `<div class="sec-type">你的次高云型是 <strong>${typeData[secType].emoji} ${typeData[secType].name}·${typeData[secType].sub}</strong>（得分接近，可能是混合型人格）</div>`
    : '';

  // Build score list
  const scoreListHtml = sorted.map(([t, s]) => {
    const isTop = t === topType;
    return `<div class="score-row">
      <span class="s-name">${typeData[t].emoji} ${typeData[t].name}</span>
      <span class="s-bar-wrap"><span class="s-bar${isTop ? ' top' : ''}" style="width:${pct[t]}%"></span></span>
      <span class="s-val">${pct[t]}%</span>
    </div>`;
  }).join('');

  // Store state for browse-back
  window._ctpiResult = { topType, secType, sorted, scores, pct };

  // Build type gallery
  const typeOrder = ['Ci','Cc','Cs','Ac','As','Sc','St','Ns','Cu','Cb'];
  const galleryHtml = typeOrder.map(t => {
    const td = typeData[t];
    const isActive = t === topType ? ' active' : '';
    return `<div class="type-card${isActive}" onclick="browseType('${t}')" title="${td.name}·${td.sub}">
      <span class="tc-emoji">${td.emoji}</span>
      <span class="tc-name">${td.name}</span>
    </div>`;
  }).join('');

  resultDiv.innerHTML = `
    <div class="type-header">
      <div class="type-emoji">${data.emoji}</div>
      <div class="type-name">${data.name} · ${data.sub}</div>
      <div class="type-subtitle">${data.family}</div>
      <div class="type-tagline">${data.tagline}</div>
    </div>

    ${renderImageCarousel(topType)}

    <div class="result-sections">
      <div class="result-card">
        <h3>☁️ 气质画像</h3>
        <p>${data.overview}</p>
      </div>

      <div class="result-card">
        <h3>✅ 优势</h3>
        <ul>${data.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>

      <div class="result-card">
        <h3>⚠️ 盲区</h3>
        <ul>${data.weaknesses.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>

      <div class="result-card">
        <h3>💼 适合领域</h3>
        <div class="tag-row">${data.careers.map(c => `<span class="tag">${c}</span>`).join('')}</div>
      </div>

      <div class="mbti-ref">🧩 MBTI 大致参考：<strong>${data.mbti}</strong></div>
    </div>

    ${secHtml}

    <div class="detail-toggle">
      <button onclick="toggleScores()">查看各型得分 ▼</button>
    </div>
    <div id="scoreDetail" style="display:none; margin-top:12px;">
      <div class="score-list">${scoreListHtml}</div>
    </div>

    <div class="type-gallery-section">
      <div class="type-gallery-title">☁️ 点击查看其他云型人格</div>
      <div class="type-gallery">${galleryHtml}</div>
    </div>

    <div class="result-actions">
      <button class="btn" onclick="copyResult('${topType}')">📋 复制结果</button>
      <button class="btn outline" onclick="retake()">🔄 重新测试</button>
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Save for share
  resultDiv._topType = topType;
}

function toggleScores() {
  const el = document.getElementById('scoreDetail');
  const btn = document.querySelector('.detail-toggle button');
  if (el.style.display === 'none') {
    el.style.display = 'block';
    btn.textContent = '收起得分详情 ▲';
    // Animate bars
    setTimeout(() => {
      el.querySelectorAll('.s-bar').forEach(b => {
        b.style.width = b.style.width; // trigger layout
      });
    }, 50);
  } else {
    el.style.display = 'none';
    btn.textContent = '查看各型得分 ▼';
  }
}

function copyResult(topType) {
  const data = typeData[topType];
  const text = `☁️ 我的云型人格：${data.name} · ${data.sub}

${data.emoji} ${data.tagline}

✅ 优势：${data.strengths.slice(0,3).join('；')}
💼 适合领域：${data.careers.join('、')}
🧩 MBTI 参考：${data.mbti}

—— 云型人格测试 CTPI`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert('结果已复制到剪贴板！可以分享给朋友了 ☁️');
    });
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('结果已复制到剪贴板！');
  }
}

function retake() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

    const isActive = t === typeKey ? ' active' : '';
    return `<div class="type-card${isActive}" onclick="browseType('${t}')" title="${td.name}·${td.sub}">
      <span class="tc-emoji">${td.emoji}</span>
      <span class="tc-name">${td.name}</span>
    </div>`;
  }).join('');

  resultDiv.innerHTML = `
    <div class="browse-header">
      <button class="btn small back" onclick="backToMyResult()">← 返回我的结果</button>
      <span class="browse-badge">正在查看：${data.emoji} ${data.name} · ${data.sub}</span>
    </div>

    <div class="type-header">
      <div class="type-emoji">${data.emoji}</div>
      <div class="type-name">${data.name} · ${data.sub}</div>
      <div class="type-subtitle">${data.family}</div>
      <div class="type-tagline">${data.tagline}</div>
    </div>

    ${renderImageCarousel(typeKey)}

    <div class="result-sections">
      <div class="result-card">
        <h3>☁️ 气质画像</h3>
        <p>${data.overview}</p>
      </div>
      <div class="result-card">
        <h3>✅ 优势</h3>
        <ul>${data.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
      <div class="result-card">
        <h3>⚠️ 盲区</h3>
        <ul>${data.weaknesses.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
      <div class="result-card">
        <h3>💼 适合领域</h3>
        <div class="tag-row">${data.careers.map(c => `<span class="tag">${c}</span>`).join('')}</div>
      </div>
      <div class="mbti-ref">🧩 MBTI 大致参考：<strong>${data.mbti}</strong></div>
    </div>

    <div class="type-gallery-section">
      <div class="type-gallery-title">☁️ 点击查看其他云型人格</div>
      <div class="type-gallery">${galleryHtml}</div>
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function backToMyResult() {
  window._ctpiResult = null;
  showResult();
}

// Init
document.getElementById('quiz').style.display = 'none';
document.getElementById('loading').style.display = 'none';
document.getElementById('result').style.display = 'none';
</script>
</body>
</html>
