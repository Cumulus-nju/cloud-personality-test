name: Traffic Tracker

on:
  schedule:
    - cron: '7 0 * * *'  # Daily at 00:07 UTC
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and merge traffic data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"

          # Fetch latest 14-day data from GitHub API
          VIEWS=$(gh api "repos/$REPO/traffic/views" --jq '.views')
          CLONES=$(gh api "repos/$REPO/traffic/clones" --jq '.clones')
          REFERRERS=$(gh api "repos/$REPO/traffic/popular/referrers" --jq '.')
          PATHS=$(gh api "repos/$REPO/traffic/popular/paths" --jq '.')

          # Read existing cumulative data
          if [ -f data/traffic.json ]; then
            EXISTING=$(cat data/traffic.json)
          else
            EXISTING='{"views":[],"clones":[],"referrers":[],"paths":[]}'
          fi

          # Merge: new data takes precedence for same timestamp
          echo "$EXISTING" | jq --argjson newViews "$VIEWS" \
            --argjson newClones "$CLONES" \
            --argjson newReferrers "$REFERRERS" \
            --argjson newPaths "$PATHS" \
            '{
              views: ($newViews + .views | unique_by(.timestamp)),
              clones: ($newClones + .clones | unique_by(.timestamp)),
              referrers: $newReferrers,
              paths: $newPaths,
              updated_at: now | todateiso8601
            }' > data/traffic.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/traffic.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update traffic data [skip ci]"
            git push
          fi
