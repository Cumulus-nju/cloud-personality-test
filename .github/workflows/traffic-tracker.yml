name: Traffic Tracker

on:
  schedule:
    - cron: '7 0 * * *'  # Daily at 00:07 UTC
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and merge traffic data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess
          from datetime import datetime, timezone

          repo = os.environ["REPO"]
          token = os.environ["GITHUB_TOKEN"]

          def fetch(endpoint, key=None):
              url = f"https://api.github.com/repos/{repo}/traffic/{endpoint}"
              r = subprocess.run(
                  ["curl", "-s", "-w", "\n%{http_code}",
                   "-H", f"Authorization: Bearer {token}",
                   "-H", "Accept: application/vnd.github+json",
                   url],
                  capture_output=True, text=True, timeout=30
              )
              parts = r.stdout.rsplit("\n", 1)
              body = parts[0] if len(parts) > 1 else ""
              code = parts[-1].strip() if len(parts) > 1 else "0"
              if r.returncode != 0 or not code.startswith("2"):
                  print(f"  [WARN] {endpoint} → HTTP {code}, using []")
                  return []
              try:
                  data = json.loads(body)
              except json.JSONDecodeError:
                  print(f"  [WARN] {endpoint} → invalid JSON, using []")
                  return []
              if key:
                  return data.get(key, [])
              return data if isinstance(data, list) else []

          print("Fetching traffic data...")
          views = fetch("views", "views")
          clones = fetch("clones", "clones")
          referrers = fetch("popular/referrers")
          paths = fetch("popular/paths")
          print(f"  views={len(views)} days, clones={len(clones)} days, referrers={len(referrers)}, paths={len(paths)}")

          # Read existing
          try:
              with open("data/traffic.json") as f:
                  existing = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              existing = {"views": [], "clones": [], "referrers": [], "paths": []}

          # Merge views by unique timestamp
          vmap = {v["timestamp"]: v for v in existing.get("views", [])}
          for v in views:
              vmap[v["timestamp"]] = v
          merged_views = sorted(vmap.values(), key=lambda x: x["timestamp"])

          # Merge clones by unique timestamp
          cmap = {c["timestamp"]: c for c in existing.get("clones", [])}
          for c in clones:
              cmap[c["timestamp"]] = c
          merged_clones = sorted(cmap.values(), key=lambda x: x["timestamp"])

          result = {
              "views": merged_views,
              "clones": merged_clones,
              "referrers": referrers,
              "paths": paths,
              "updated_at": datetime.now(timezone.utc).isoformat()
          }

          with open("data/traffic.json", "w") as f:
              json.dump(result, f, indent=2, ensure_ascii=False)

          print(f"Saved: {len(merged_views)} view entries, {len(merged_clones)} clone entries")
          print("Done.")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/traffic.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update traffic data [skip ci]"
            git push
          fi
