name: Traffic Tracker

on:
  schedule:
    - cron: '7 0 * * *'  # Daily at 00:07 UTC
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and merge traffic data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          # Fetch API data safely (return [] on any failure)
          fetch_traffic() {
            gh api "repos/$REPO/traffic/$1" --jq "${2:-.}" 2>/dev/null || echo '[]'
          }

          VIEWS=$(fetch_traffic views '.views // []')
          CLONES=$(fetch_traffic clones '.clones // []')
          REFERRERS=$(fetch_traffic 'popular/referrers' '. // []')
          PATHS=$(fetch_traffic 'popular/paths' '. // []')

          # Validate JSON
          for val in VIEWS CLONES REFERRERS PATHS; do
            echo "${!val}" | jq '.' > /dev/null 2>&1 || eval "$val='[]'"
          done

          # Read existing cumulative data
          if [ -f data/traffic.json ]; then
            EXISTING=$(cat data/traffic.json)
          else
            EXISTING='{"views":[],"clones":[],"referrers":[],"paths":[]}'
          fi

          # Merge: new data takes precedence for same timestamp
          echo "$EXISTING" | jq --argjson newViews "$VIEWS" \
            --argjson newClones "$CLONES" \
            --argjson newReferrers "$REFERRERS" \
            --argjson newPaths "$PATHS" \
            '{
              views: ($newViews + .views | unique_by(.timestamp)),
              clones: ($newClones + .clones | unique_by(.timestamp)),
              referrers: $newReferrers,
              paths: $newPaths,
              updated_at: now | todate
            }' > data/traffic.json

          echo "Saved: $(wc -c < data/traffic.json) bytes"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/traffic.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update traffic data [skip ci]"
            git push
          fi
